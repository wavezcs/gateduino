##############################################################
# gateduino-gate — Gate controller node (primary, autonomous)
# Owns the full open/close state machine. Decides locally from ESP-NOW TRIGGER
# events (front/back) + its own BLE scan — no dependency on HA.
# HA is supervisory: dashboard, manual open/close, Auto Mode disarm, tuning.
# HA-only (native API); no MQTT.
#
# Hybrid transit logic:
#   - First node to TRIGGER = entry side; gate opens.
#   - During the crossing, a TRIGGER from the OPPOSITE side is the mower exiting:
#     it is suppressed (no re-open) but extends the hold.
#   - child_cooldown is a time-based backstop (same-side spam + post-close window).
#   - Closes once held >= transit_timeout since last trigger AND the gate's own
#     RSSI no longer sees the mower (RSSI self-decays to -100 when stale).
#
# Hardware (only pin kept — the physical gate relay):
#   GPIO5 (XIAO D4) — gate relay, active-low (on=open)
#
# Luba BLE MAC: set as `luba_mac` in secrets.yaml (see README)
##############################################################

substitutions:
  node_name: gateduino-gate
  node_role: gate
  child_cooldown: "30"   # s; backstop window ignoring triggers after one is accepted

packages:
  base: !include common.yaml

esphome:
  name: ${node_name}
  friendly_name: "Gateduino Gate"
  on_boot:
    priority: -100
    then:
      - switch.turn_off: gate_relay

api:
  encryption:
    key: !secret api_key_gate
  services:
    - service: open_gate       # momentary open (auto-closes after Manual Open Duration)
      then:
        - script.execute: momentary_open
    - service: close_gate
      then:
        - globals.set: { id: hold_open, value: "false" }
        - script.execute: close_gate_now

globals:
  - id: auto_enabled
    type: bool
    restore_value: false
    initial_value: "true"  # driven by the auto_mode switch (RESTORE_DEFAULT_ON)
  # Direction state machine
  - id: entry_side
    type: uint8_t
    restore_value: false
    initial_value: "0"     # 0=none, 1=front, 2=back, 3=gate/manual
  - id: crossing_active
    type: bool
    restore_value: false
    initial_value: "false"
  - id: last_trigger_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: open_since_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  # Manual control state (overrides the autonomous transit logic):
  - id: hold_open          # true = stay open indefinitely until released
    type: bool
    restore_value: false
    initial_value: "false"
  - id: manual_until_ms    # !=0 = momentary open; close at this millis()
    type: uint32_t
    restore_value: false
    initial_value: "0"

# ---- Gate-only HA-editable config -------------------------------------------
number:
  - platform: template
    name: "Child Cooldown"
    id: child_cooldown_num
    icon: "mdi:timer-lock-outline"
    unit_of_measurement: s
    optimistic: true
    restore_value: true
    initial_value: ${child_cooldown}
    min_value: 0
    max_value: 120
    step: 1
    mode: box
    entity_category: config

  - platform: template
    name: "Manual Open Duration"
    id: manual_open_secs
    icon: "mdi:timer-outline"
    unit_of_measurement: s
    optimistic: true
    restore_value: true
    initial_value: "15"
    min_value: 1
    max_value: 300
    step: 1
    mode: box
    entity_category: config

# ---- Manual control button (Momentary Open) ---------------------------------
button:
  - platform: template
    name: "Momentary Open"
    icon: "mdi:gate-open"
    on_press:
      # If Hold Open is engaged, a momentary press cancels the hold and closes
      # the gate (toggle), rather than re-opening. Otherwise: normal momentary.
      - if:
          condition:
            lambda: "return id(hold_open);"
          then:
            - switch.turn_off: hold_open_switch   # runs hold_open=false + close_gate_now
          else:
            - script.execute: momentary_open

sensor:
  # Gate node also scans BLE — third RSSI point right at the gate, and the
  # close-confirmation source. Self-decays to -100 when the mower goes silent.
  - platform: ble_rssi
    mac_address: ${luba_mac}
    name: "Luba RSSI"
    id: luba_rssi
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
      - timeout:
          timeout: ${rssi_timeout}
          value: -100.0
      - heartbeat: 5s

binary_sensor:
  - platform: ble_presence
    mac_address: ${luba_mac}
    name: "Luba Present"
    id: luba_present
    timeout: 30s

  # Diagnostic: is a transit crossing currently in progress?
  - platform: template
    name: "Crossing Active"
    id: crossing_active_bs
    entity_category: diagnostic
    lambda: "return id(crossing_active);"

# Diagnostic: which side the current crossing entered from.
text_sensor:
  - platform: template
    name: "Entry Side"
    entity_category: diagnostic
    update_interval: 2s
    lambda: |-
      switch (id(entry_side)) {
        case 1: return {"front"};
        case 2: return {"back"};
        case 3: return {"gate/manual"};
        default: return {"none"};
      }

# ---- ESP-NOW receiver: hybrid transit decision ------------------------------
# Packet: [0x2B, src(1=front,2=back), event(1=TRIGGER), rssi(int8)]
espnow:
  on_broadcast:
    - lambda: |-
        if (size < 4 || data[0] != 0x2B || data[2] != 1) return;     // TRIGGER events only
        if (!id(auto_enabled) || !id(ble_scanning).state) return;
        if (id(hold_open) || id(manual_until_ms) != 0) return;        // manual control wins
        uint8_t src = data[1];                                        // 1=front, 2=back
        uint32_t now = millis();
        uint32_t cooldown_ms = (uint32_t) id(child_cooldown_num).state * 1000UL;

        // Exit-side suppression: during a crossing, the opposite side is the
        // mower completing its transit — hold, don't re-open.
        if (id(crossing_active) && id(entry_side) != 0 && src != id(entry_side)) {
          id(last_trigger_ms) = now;
          id(activity_log).publish_state(src == 1
              ? "Exit-side FRONT trigger suppressed - completing crossing"
              : "Exit-side BACK trigger suppressed - completing crossing");
          return;
        }

        // Time-based backstop: ignore triggers within child_cooldown of the last
        // accepted one (same-side spam + post-close re-trigger window).
        if (id(last_trigger_ms) != 0 && (now - id(last_trigger_ms)) < cooldown_ms) {
          id(activity_log).publish_state("Trigger within child_cooldown - ignored");
          return;
        }

        // Accept as the entry trigger for a new crossing.
        id(entry_side) = src;
        id(crossing_active) = true;
        id(last_trigger_ms) = now;
        if (!id(gate_relay).state) {
          id(open_since_ms) = now;
          id(gate_relay).turn_on();
        }
        id(activity_log).publish_state(src == 1
            ? "FRONT trigger accepted - opening gate"
            : "BACK trigger accepted - opening gate");

# ---- Gate relay + switches --------------------------------------------------
switch:
  # Gate relay — active LOW (inverted: true means on=relay-closed=gate-open).
  # This is the only GPIO pin in the whole system — it physically opens the gate.
  - platform: gpio
    pin:
      number: GPIO5  # XIAO D4
      inverted: true
    name: "Gate"
    id: gate_relay
    restore_mode: ALWAYS_OFF

  # Auto Mode — armed by default so an HA outage leaves the gate autonomous.
  # HA disarms during BLE-proxy conflicts or schedule lockouts.
  - platform: template
    name: "Auto Mode"
    id: auto_mode
    icon: "mdi:robot"
    lambda: "return id(auto_enabled);"
    turn_on_action:
      - globals.set:
          id: auto_enabled
          value: "true"
      - text_sensor.template.publish:
          id: activity_log
          state: "Auto Mode ON"
    turn_off_action:
      - globals.set:
          id: auto_enabled
          value: "false"
      - text_sensor.template.publish:
          id: activity_log
          state: "Auto Mode OFF (disarmed)"
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config

  # Hold Open — stay open indefinitely until released (the old hold-open switch).
  # Suppresses the autonomous close + ignores mower triggers while held.
  - platform: template
    name: "Hold Open"
    id: hold_open_switch
    icon: "mdi:gate-arrow-right"
    lambda: "return id(hold_open);"
    turn_on_action:
      - globals.set: { id: hold_open, value: "true" }
      - globals.set: { id: manual_until_ms, value: "0" }
      - globals.set: { id: entry_side, value: "3" }
      - switch.turn_on: gate_relay
      - text_sensor.template.publish:
          id: activity_log
          state: "Hold Open ON"
    turn_off_action:
      - globals.set: { id: hold_open, value: "false" }
      - script.execute: close_gate_now
      - text_sensor.template.publish:
          id: activity_log
          state: "Hold Open OFF - released"

script:
  # Momentary open: open now, auto-close after Manual Open Duration seconds.
  # (HA service open_gate + the Momentary Open button both call this.)
  - id: momentary_open
    mode: restart   # re-press restarts the timer
    then:
      - globals.set: { id: hold_open, value: "false" }
      - globals.set: { id: entry_side, value: "3" }
      - globals.set:
          id: open_since_ms
          value: !lambda "return millis();"
      - globals.set:
          id: manual_until_ms
          value: !lambda "return millis() + (uint32_t) id(manual_open_secs).state * 1000UL;"
      - switch.turn_on: gate_relay
      - text_sensor.template.publish:
          id: activity_log
          state: !lambda |
            char b[48];
            snprintf(b, sizeof(b), "Momentary open (%ds)", (int) id(manual_open_secs).state);
            return std::string(b);

  # Close + clear all manual/transit state.
  - id: close_gate_now
    mode: single
    then:
      - globals.set: { id: manual_until_ms, value: "0" }
      - globals.set: { id: crossing_active, value: "false" }
      - globals.set: { id: entry_side, value: "0" }
      - switch.turn_off: gate_relay

# ---- Autonomous control loop ------------------------------------------------
interval:
  - interval: 1s
    then:
      - lambda: |-
          uint32_t now = millis();
          float trig = id(trigger_rssi_num).state;
          uint32_t hold_ms = (uint32_t) id(transit_timeout_num).state * 1000UL;
          bool local_at_gate = (id(luba_rssi).state >= trig);

          // Manual control (hold / momentary) overrides the autonomous logic.
          if (id(hold_open)) {
            if (!id(gate_relay).state) id(gate_relay).turn_on();  // keep asserted
            return;   // stay open until released
          }
          if (id(manual_until_ms) != 0) {
            if (now >= id(manual_until_ms)) {
              id(manual_until_ms) = 0;
              id(gate_relay).turn_off();
              id(crossing_active) = false;
              id(entry_side) = 0;
              id(activity_log).publish_state("Momentary open expired - closed");
            }
            return;
          }

          // Backup self-open: gate's own BLE sees the mower at trigger range and
          // no child fired. Respect child_cooldown so it can't reopen right after
          // a completed crossing.
          if (local_at_gate && id(auto_enabled) && id(ble_scanning).state && !id(gate_relay).state) {
            uint32_t cooldown_ms = (uint32_t) id(child_cooldown_num).state * 1000UL;
            if (id(last_trigger_ms) == 0 || (now - id(last_trigger_ms)) >= cooldown_ms) {
              id(entry_side) = 3;
              id(crossing_active) = true;
              id(last_trigger_ms) = now;
              id(open_since_ms) = now;
              id(gate_relay).turn_on();
              id(activity_log).publish_state("Gate self-open (mower at gate, no child trigger)");
            }
          }

          // Close: open, held >= transit_timeout since last trigger, and gate's
          // own BLE no longer sees the mower (RSSI decayed / out of range).
          if (id(gate_relay).state) {
            bool held = (now - id(last_trigger_ms)) >= hold_ms;
            bool cleared = !local_at_gate;
            if (held && cleared) {
              id(gate_relay).turn_off();
              id(crossing_active) = false;
              id(entry_side) = 0;
              id(activity_log).publish_state("Gate closed - mower cleared, transit complete");
            }
          }
