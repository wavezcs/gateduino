##############################################################
# Gateduino — shared base configuration (ESPHome package)
#
# Include in each node yaml via:
#   packages:
#     base: !include common.yaml
#
# Required substitutions (must be set in the node yaml):
#   node_name  — e.g. gateduino-front
#   node_role  — e.g. front, back, gate
#
# Optional overrides (defaults shown below):
#   luba_mac       — Luba BLE MAC address
#   trigger_rssi   — inner zone threshold (dBm), gate opens
#   area_rssi      — outer zone threshold (dBm), mower approaching
##############################################################

substitutions:
  luba_mac: "C8:FE:0F:1D:0A:F8"
  trigger_rssi: "-76"
  area_rssi: "-87"
  min_open_sec: "30"
  close_delay_sec: "15"

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: INFO

ota:
  - platform: esphome
    password: !secret ota_password

captive_portal:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${node_name}-fb"
    password: !secret fallback_password

mqtt:
  broker: !secret mqtt_broker
  port: 1883
  username: !secret mqtt_user
  password: !secret mqtt_password
  birth_message:
    topic: gateduino/${node_role}/lwt
    payload: online
    retain: true
  will_message:
    topic: gateduino/${node_role}/lwt
    payload: offline
    retain: true
  discovery: false

# Passive BLE scanning — never connects, just reads advertisement RSSI.
# active: false is critical — active scanning sends connection requests
# which can interfere with the mower's BLE state.
esp32_ble_tracker:
  scan_parameters:
    active: false
    interval: 160ms
    window: 80ms      # 50% duty cycle
    continuous: true

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"

# Broadcast command handler — BLE scanning enable/disable acknowledgement.
# Gate node also adds OPEN/CLOSE handlers for gateduino/all/command in its own yaml.
text_sensor:
  - platform: mqtt_subscribe
    name: "Global Command"
    topic: gateduino/all/command
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x == "DISABLE_BLE_SCANNING";'
            then:
              - mqtt.publish:
                  topic: gateduino/${node_role}/log
                  payload: "BLE scanning disable acknowledged"
        - if:
            condition:
              lambda: 'return x == "ENABLE_BLE_SCANNING";'
            then:
              - mqtt.publish:
                  topic: gateduino/${node_role}/log
                  payload: "BLE scanning enable acknowledged"
