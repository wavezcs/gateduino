<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 200" role="img" aria-label="Gateduino">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11271C"/>
      <stop offset="1" stop-color="#081109"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#48E08A"/>
      <stop offset="1" stop-color="#23B866"/>
    </linearGradient>
  </defs>

  <rect width="660" height="200" rx="28" fill="url(#bg)"/>
  <rect x="3" y="3" width="654" height="194" rx="26" fill="none" stroke="#1E4633" stroke-width="2"/>

  <!-- Gate mark (the icon, scaled into the banner) -->
  <g transform="translate(34,24) scale(0.297)">
    <g fill="none" stroke="url(#acc)" stroke-linecap="round">
      <path d="M372 196 a64 64 0 0 1 0 120" stroke-width="14" opacity="0.95"/>
      <path d="M404 168 a100 100 0 0 1 0 176" stroke-width="12" opacity="0.55"/>
      <path d="M436 142 a136 136 0 0 1 0 228" stroke-width="10" opacity="0.30"/>
    </g>
    <g fill="#E8F5EE">
      <rect x="92"  y="158" width="30" height="232" rx="12"/>
      <rect x="296" y="158" width="30" height="232" rx="12"/>
    </g>
    <rect x="122" y="246" width="174" height="120" rx="14" fill="none" stroke="#E8F5EE" stroke-width="14"/>
    <g stroke="#E8F5EE" stroke-width="10" stroke-linecap="round">
      <line x1="166" y1="258" x2="166" y2="354"/>
      <line x1="209" y1="258" x2="209" y2="354"/>
      <line x1="252" y1="258" x2="252" y2="354"/>
    </g>
    <line x1="130" y1="358" x2="288" y2="254" stroke="url(#acc)" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="212" y="100" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="74" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#E8F5EE">Gate</tspan><tspan fill="url(#acc)">duino</tspan>
  </text>

  <!-- Tagline, two rows -->
  <text x="214" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="18" font-weight="500" letter-spacing="1" fill="#7FB89A">
    <tspan x="214" y="134">AUTONOMOUS GATE CONTROLLER</tspan>
    <tspan x="214" y="159">FOR ROBOT MOWERS</tspan>
  </text>
</svg>
